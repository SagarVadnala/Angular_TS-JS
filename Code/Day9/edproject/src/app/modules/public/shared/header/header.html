@let currentUser = authService.currentUser;

<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">PUBLIC</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
      aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="navbar-nav">
        <a class="nav-link" [routerLink]="['courses']" routerLinkActive="active">Courses</a>
        @if(currentUser)
        {
          Welcome {{currentUser.name}} 
          <button class="btn btn-outline-danger" (click)="logoutClick()">Logout</button>
        }
        @else
        {
        <a class="nav-link" [routerLink]="['signup']" routerLinkActive="active">Sign up</a>
        <a class="nav-link" [routerLink]="['login']" routerLinkActive="active">Login</a>
        }
      </div>
    </div>
  </div>
</nav>
