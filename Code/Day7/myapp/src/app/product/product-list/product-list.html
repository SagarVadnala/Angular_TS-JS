<h4>Product List</h4>

{{products | json}}

<table class="table table-striped">
    <thead>
        <tr>
            <th>Product Id</th>
            <th>Product Code</th>
            <th>Product Name</th>
            <th>Product Price</th>
            <th>Delete</th>
            <th>Edit</th>
        </tr>
    </thead>
    <tbody>
        @for(product of products();track $index){
        <tr>
            <td>{{product.productId}}</td>
            <td>{{product.productCode}}</td>
            <td>{{product.productName}}</td>
            <td>{{product.price}}</td>
            <td>
                <input type="button" class="btn btn-danger" title="Delete Product"
                (click)="deleteProduct(product)" value="X"/>
            </td>
            <td>
                <input type="button" class="btn btn-warning" title="Edit Product"
                (click)="editProduct(product)" value="Edit"/>
            </td>
        </tr>
        }
    </tbody>
</table>
